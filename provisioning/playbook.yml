- name: Configure Kali Box for Wireshark
  hosts: home
  become: yes                          # Wechselt zu Root, um die Sudoers-Datei zu schreiben
  tasks:

    - name: Allow kali user to use sudo without a password
      ansible.builtin.copy:
        content: "kali ALL=(ALL) NOPASSWD:ALL"
        dest: /etc/sudoers.d/kali
        mode: '0440'
        validate: /usr/sbin/visudo -cf %s
